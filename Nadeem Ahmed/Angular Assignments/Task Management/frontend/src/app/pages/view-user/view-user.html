<div class="container mt-4">
  @if (user()) {
    <div class="card shadow">
      <div class="card-header">
        <h3>User Details</h3>
      </div>

      <div class="card-body">
        <p>
          <strong>ID:</strong>
          {{ user()?.id }}
        </p>

        <p>
          <strong>Username:</strong>
          {{ user()?.username }}
        </p>

        <p>
          <strong>Email:</strong>
          {{ user()?.email }}
        </p>
      </div>
    </div>
  }
</div>

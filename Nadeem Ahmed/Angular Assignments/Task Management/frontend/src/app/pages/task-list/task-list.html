<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header">
      <h3>Task List</h3>
    </div>

    <div class="card-body">
      <table class="table table-bordered">
        <thead>
          <tr>
            <th>Title</th>

            <th>Status</th>

            <th>Assigned To</th>

            <th>Due Date</th>

            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          @for (task of tasks(); track task.id) {
            <tr>
              <td>
                {{ task.title }}
              </td>

              <td>
                {{ task.status }}
              </td>

              <td>
                {{ task.assignedToUserId }}
              </td>

              <td>
                {{ task.dueDate | date: 'dd MMM yyyy' }}
              </td>

              <td>
                <button class="btn btn-primary btn-sm me-2" [routerLink]="['/tasks/view', task.id]">
                  View
                </button>

                <button class="btn btn-warning btn-sm" [routerLink]="['/tasks/edit', task.id]">
                  Edit
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="container mt-4">

  <div class="card shadow">

    <div class="card-header">

      <h3>
        Edit User
      </h3>

    </div>

    <div class="card-body">

      <form
        [formGroup]="userForm"
        (ngSubmit)="updateUser()">

        <div class="mb-3">

          <label>
            Username
          </label>

          <input
            type="text"
            class="form-control"
            formControlName="username">

        </div>

        <div class="mb-3">

          <label>
            Email
          </label>

          <input
            type="email"
            class="form-control"
            formControlName="email">

        </div>

        <div class="mb-3">

          <label>
            Role
          </label>

          <select
            class="form-select"
            formControlName="roleId">

            <option [value]="1">
              Admin
            </option>

            <option [value]="2">
              Manager
            </option>

            <option [value]="3">
              Employee
            </option>

          </select>

        </div>

        <button
          type="submit"
          class="btn btn-primary">

          Update User

        </button>

      </form>

    </div>

  </div>

</div>
